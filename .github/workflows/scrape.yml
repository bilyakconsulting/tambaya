name: Scrape
on:
  schedule:
    - cron: "0 5,12,19 * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - run: python scraper.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - run: |
          git config user.name "tambaya-bot"
          git config user.email "bot@tambaya.local"
          git add articles.json cache.db
          git diff --staged --quiet || git commit -m "Update articles $(date -u +%FT%TZ)"
          git push
